spring:
  config:
    import: optional:file:.env[.properties]
  profiles:
    active: dev
  application:
    name: ShopSphere
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/ShopSphereDB}
    username: ${DB_USERNAME:aeisel}
    password: ${DB_PASSWORD:azerty}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: false
    hibernate:
      ddl-auto: update
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:shopsphere.notify@gmail.com}
    password: ${MAIL_PASSWORD:your_gmail_app_password_here}
    properties:
      mail:
        smtp:
          trust: smtp.gmail.com
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

springdoc:
  default-produces-media-type: application/json
  servlet:
    max-file-size: 50MB

application:
  security:
    jwt:
      mailing:
        frontend:
          activation-url: ${FRONTEND_ACTIVATION_URL:http://localhost:4200/activate-account}
      secret-key: ${JWT_SECRET}
      expiration: ${JWT_EXPIRATION:86400000}
      refresh-token:
        expiration: ${JWT_REFRESH_EXPIRATION:604800000}
    file:
      uploads:
        photos-output-path: ./uploads
  stripe:
    secret-key: ${STRIPE_SECRET_KEY}
    publishable-key: ${STRIPE_PUBLISHABLE_KEY:pk_test_REPLACE_WITH_YOUR_PUBLISHABLE_KEY}

server:
  port: 8088
  servlet:
    context-path: /api/v1/
